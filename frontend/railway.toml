[build]
builder = "DOCKERFILE"
dockerfilePath = "./Dockerfile.prod"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Variables de entorno para producción
[variables]
NODE_ENV = "production"
PORT = "3000"
NEXT_PUBLIC_API_URL = "${{RAILWAY_PUBLIC_DOMAIN}}/trpc"
