[build]
builder = "NIXPACKS"

[deploy]
startCommand = "docker-compose up"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "database"
source = "."
# Railway detectará automáticamente PostgreSQL desde docker-compose

[[services]]
name = "backend"
source = "./backend"
# Railway construirá el backend desde el directorio backend

[[services]]
name = "frontend"
source = "./frontend"
# Railway construirá el frontend desde el directorio frontend
